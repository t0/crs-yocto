CONFIG_ENV_SOURCE_FILE="t0-crs"

CONFIG_VIDEO=n
CONFIG_NET_LWIP=y

CONFIG_CMD_DISPLAY=y
CONFIG_CMD_FWDISCOVER=y

# Hash/checksum commands (used by fwdiscover --reflash)
CONFIG_CMD_HASH=y
CONFIG_HASH_VERIFY=y
CONFIG_CMD_CRC32=y
CONFIG_CRC32_VERIFY=y
CONFIG_CMD_MD5SUM=y
CONFIG_MD5SUM_VERIFY=y
CONFIG_SHA256=y

# SPI flash (used by fwdiscover --reflash)
CONFIG_CMD_SF=y

# Partition commands (used by fwdiscover --reflash-mmc)
CONFIG_CMD_MBR=y
CONFIG_CMD_PART=y

CONFIG_PCI=y
CONFIG_PCIE_XILINX_NWL=y
CONFIG_CMD_PCI=y
CONFIG_NVME=y
CONFIG_NVME_PCI=y
CONFIG_CMD_NVME=y
